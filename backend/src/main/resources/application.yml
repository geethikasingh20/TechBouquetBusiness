server:
  port: ${PORT:8080}

spring:
  config:
    import: optional:file:backend/.env[.properties],optional:file:.env[.properties]
  datasource:
    ## url: jdbc:postgresql://localhost:5432/techbouquet
    # username: postgres
    # password: postgres
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/techbouquet}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  level:
    com.techbouquet: INFO

app:
  jwt:
    issuer: techbouquet
    secret: ${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET}
    ttlMinutes: 1440
  email:
    verifyUrlBase: ${VERIFY_EMAIL_URL_BASE:http://localhost:8080/api/auth/verify-email?token=}
    verifyTtlMinutes: ${VERIFY_EMAIL_TTL_MINUTES:1440}
    assets:
      logoUrl: ${EMAIL_LOGO_URL:}
      backgroundUrl: ${EMAIL_BG_URL:}
    sendgrid:
      apiKey: ${SENDGRID_API_KEY:}
      fromEmail: ${SENDGRID_FROM_EMAIL:}
      fromName: ${SENDGRID_FROM_NAME:Velvet Petals}
